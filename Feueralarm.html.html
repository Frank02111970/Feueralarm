<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>Feueralarm – api GmbH</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#f0f2f5}
/* TOPBAR */
.topbar{background:#fff;display:flex;align-items:center;padding:10px 16px;gap:10px;
  position:sticky;top:0;z-index:100;border-bottom:1px solid #e0e0e0;
  box-shadow:0 2px 8px rgba(0,0,0,.08)}
/* BOTTOM NAV */
.botnav{position:fixed;bottom:0;left:0;right:0;background:#fff;
  border-top:1px solid #e0e0e0;display:none;z-index:100;
  box-shadow:0 -2px 8px rgba(0,0,0,.06)}
.botnav-inner{display:flex;max-width:600px;margin:0 auto}
.bn{flex:1;display:flex;flex-direction:column;align-items:center;
  padding:8px 4px;border:none;background:none;color:#999;
  font-size:10px;font-weight:600;cursor:pointer;font-family:inherit;gap:2px}
.bn .ic{font-size:22px}
.bn.on{color:#CC0000}
/* PAGES */
.page{display:none;padding:16px;max-width:600px;margin:0 auto;padding-bottom:80px}
.page.on{display:block}
/* CARDS */
.card{background:#fff;border-radius:12px;padding:14px 16px;margin-bottom:8px;
  box-shadow:0 1px 4px rgba(0,0,0,.06)}
.card.clickable{cursor:pointer}
.card.clickable:active{background:#f5f5f5}
/* STATUS BADGES */
.badge{display:inline-block;font-size:12px;font-weight:600;
  padding:4px 10px;border-radius:20px}
.b-present{background:#e8f5e9;color:#2e7d32}
.b-homeoffice{background:#f3e5f5;color:#6a1b9a}
.b-sick{background:#ffebee;color:#c62828}
.b-vacation{background:#e3f2fd;color:#1565c0}
.b-absent{background:#f5f5f5;color:#37474f}
.b-none{background:#f0f0f0;color:#aaa}
/* STAT BOX */
.statbox{background:#1e3a8a;border-radius:16px;padding:24px;
  text-align:center;margin-bottom:12px;color:#fff}
.statnum{font-size:72px;font-weight:700;line-height:1}
/* ALARM BTN */
.alarmbtn{background:#CC0000;border:none;border-radius:16px;padding:28px;
  width:100%;cursor:pointer;text-align:center;margin-bottom:16px;
  box-shadow:0 6px 20px rgba(204,0,0,.4);font-family:inherit}
.alarmbtn.active{background:#FF6600}
/* FORMS */
label{display:block;font-size:13px;font-weight:600;color:#555;margin:12px 0 4px}
input,select,textarea{width:100%;border:1.5px solid #ddd;border-radius:8px;
  padding:11px 13px;font-size:16px;font-family:inherit}
input:focus,select:focus{outline:none;border-color:#1e3a8a}
/* BTNS */
.btn{display:block;width:100%;border:none;border-radius:10px;
  padding:14px;font-size:16px;font-weight:700;cursor:pointer;
  font-family:inherit;margin-top:12px}
.btn-primary{background:#1e3a8a;color:#fff}
.btn-red{background:#CC0000;color:#fff}
.btn-gray{background:#f0f0f0;color:#333}
.sbtn{border:none;border-radius:8px;padding:7px 12px;font-size:13px;
  font-weight:600;cursor:pointer;font-family:inherit}
.sbtn-red{background:#CC0000;color:#fff}
.sbtn-gray{background:#f0f0f0;color:#333}
.sbtn-blue{background:#1e3a8a;color:#fff}
/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500}
.overlay.on{display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:#fff;border-radius:16px;padding:24px;width:100%;
  max-width:440px;max-height:88vh;overflow-y:auto}
/* STATUS MODAL - bottom sheet */
#smOverlay{display:none;position:fixed;inset:0;z-index:9000}
#smOverlay.on{display:block}
#smBg{position:absolute;inset:0;background:rgba(0,0,0,.5)}
#smSheet{position:absolute;bottom:0;left:0;right:0;background:#fff;
  border-radius:20px 20px 0 0;padding:24px 20px;max-height:85vh;overflow-y:auto}
/* LOGIN */
#pgLogin{background:#1e3a8a;min-height:100vh;display:flex;
  flex-direction:column;align-items:center;justify-content:center;padding:20px}
.login-box{background:#fff;border-radius:16px;padding:28px;width:100%;max-width:400px}
/* ALARM PAGE */
.alarm-header{background:#CC0000;color:#fff;padding:16px 20px}
.alarm-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:12px}
.astat{background:rgba(255,255,255,.2);border-radius:10px;padding:10px;text-align:center}
.astat-n{font-size:24px;font-weight:700}
.astat-l{font-size:10px;opacity:.8;margin-top:2px}
.checkin-card{background:#fff;border-radius:12px;padding:14px;margin-bottom:8px;
  border-left:4px solid #ddd;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.checkin-card.safe{border-left-color:#2e7d32}
.checkin-card.missing{border-left-color:#c62828}
.checkin-card.injured{border-left-color:#e65100}
.checkin-btns{display:flex;gap:6px;margin-top:10px}
.checkin-btns button{flex:1;border:none;border-radius:8px;padding:10px 6px;
  font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.resolve-bar{position:fixed;bottom:65px;left:0;right:0;background:#fff;
  border-top:1px solid #eee;padding:12px 16px;display:flex;gap:10px;
  box-shadow:0 -4px 12px rgba(0,0,0,.08);z-index:200}
/* MISC */
.empty{text-align:center;padding:40px 20px;color:#aaa;font-size:14px}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);
  background:#333;color:#fff;padding:10px 20px;border-radius:8px;font-size:14px;
  opacity:0;transition:all .3s;z-index:9999;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{background:#2e7d32}
.toast.err{background:#c62828}
.sec-title{font-size:11px;font-weight:700;text-transform:uppercase;
  letter-spacing:1px;color:#888;margin-bottom:10px}
.back-btn{background:none;border:none;color:#1e3a8a;font-size:14px;
  font-weight:600;cursor:pointer;padding:0;font-family:inherit;margin-bottom:12px}
@media(max-width:600px){
  .topbar-desktop{display:none!important}
}
</style>
</head>

function tick() {
  var n=new Date();
  var days=['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];
  var months=['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
  var d=document.getElementById('topDate');
  var t=document.getElementById('topTime');
  if(d) d.textContent=days[n.getDay()]+', '+n.getDate()+'. '+months[n.getMonth()]+' '+n.getFullYear();
  if(t) t.textContent=n.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'})+' Uhr';
}
tick(); setInterval(tick,10000);

var PAGES = ['pgHome','pgAnwesenheit','pgMitarbeiter','pgHistorie','pgAdmin'];
var currentPage = 0;

function showPage(idx) {
  PAGES.forEach(function(p,i){
    document.getElementById(p).className='page'+(i===idx?' on':'');
  });
  for(var i=0;i<5;i++){
    var b=document.getElementById('bn'+i);
    if(b) b.className='bn'+(i===idx?' on':'');
  }
  currentPage=idx;
  if(idx===0) renderHome();
  if(idx===1) renderAnwesenheit();
  if(idx===2) renderMitarbeiter();
  if(idx===3) renderHistorie();
  if(idx===4) renderAdmin();
  // Hide alarm page when switching
  document.getElementById('pgAlarm').className='page';
}

// ══ UTILS ═════════════════════════════════════════════════════
function h(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function today(){return new Date().toISOString().slice(0,10);}
function getUserDepts(){
  if(!CU||CU.role==='admin') return null;
  if(CU.departments&&CU.departments.length) return CU.departments;
  return null;
}
function getAdjMap(ds){
  var m={};
  D.adjustments.filter(function(a){return a.date===ds;}).forEach(function(a){m[a.eid]=a;});
  return m;
}
function statusBadge(status){
  var map={present:'✅ Anwesend',homeoffice:'🏠 Homeoffice',sick:'🤒 Krank',vacation:'🌴 Urlaub',absent:'❌ Abwesend'};
  var cls={present:'b-present',homeoffice:'b-homeoffice',sick:'b-sick',vacation:'b-vacation',absent:'b-absent'};
  if(!status) return '<span class="badge b-none">Kein Status</span>';
  return '<span class="badge '+cls[status]+'">'+map[status]+'</span>';
}

var _tt;
function toast(msg,type){
  var el=document.getElementById('toast');
  el.textContent=msg; el.className='toast show '+(type||'');
  clearTimeout(_tt); _tt=setTimeout(function(){el.className='toast';},2500);
}

// ══ STATUS SHEET ══════════════════════════════════════════════
var _smCb=null;
function smOpen(eid, ds, cb) {
  var emp=D.employees.find(function(e){return e.id===eid;});
  if(!emp){toast('Mitarbeiter nicht gefunden','err');return;}
  _smCb=cb||null;
  document.getElementById('smName').textContent=emp.name;
  document.getElementById('smDate').textContent=ds;
  var ST=[
    ['present','✅ Anwesend','#2e7d32','#e8f5e9'],
    ['homeoffice','🏠 Homeoffice','#6a1b9a','#f3e5f5'],
    ['sick','🤒 Krank','#c62828','#ffebee'],
    ['vacation','🌴 Urlaub','#1565c0','#e3f2fd'],
    ['absent','❌ Abwesend','#37474f','#f5f5f5']
  ];
  var container=document.getElementById('smBtns');
  container.innerHTML='';
  ST.forEach(function(s){
    var btn=document.createElement('button');
    btn.style.cssText='display:block;width:100%;border:2px solid '+s[2]+';border-radius:12px;padding:16px;margin-bottom:10px;background:'+s[3]+';color:'+s[2]+';font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;text-align:left';
    btn.textContent=s[1];
    btn.dataset.eid=eid; btn.dataset.ds=ds; btn.dataset.st=s[0];
    btn.addEventListener('click',function(){smSave(parseInt(this.dataset.eid),this.dataset.ds,this.dataset.st);});
    container.appendChild(btn);
  });
  var resetBtn=document.createElement('button');
  resetBtn.style.cssText='display:block;width:100%;border:2px solid #ddd;border-radius:12px;padding:14px;margin-bottom:10px;background:#fff;color:#aaa;font-size:14px;cursor:pointer;font-family:inherit;text-align:left';
  resetBtn.textContent='🔄 Zurücksetzen';
  resetBtn.dataset.eid=eid; resetBtn.dataset.ds=ds;
  resetBtn.addEventListener('click',function(){smSave(parseInt(this.dataset.eid),this.dataset.ds,null);});
  container.appendChild(resetBtn);
  document.getElementById('smOverlay').className='on';
}
function smClose(){
  document.getElementById('smOverlay').className='';
  _smCb=null;
}
function smSave(eid, ds, status) {
  document.getElementById('smOverlay').className='';
  if(status===null||status==='null'){
    D.adjustments=D.adjustments.filter(function(a){return !(a.eid===eid&&a.date===ds);});
  } else {
    var ex=D.adjustments.find(function(a){return a.eid===eid&&a.date===ds;});
    if(ex){ex.status=status;ex.note='';}
    else D.adjustments.push({id:nid('adj'),eid:eid,date:ds,status:status,note:''});
  }
  save();
  // Sync to Supabase
  var syncAdj = D.adjustments.find(function(a){return a.eid===eid&&a.date===ds;});
  sbSyncAdj(eid, ds, status);
  toast('Gespeichert','ok');
  var cb=_smCb; _smCb=null;
  if(cb) cb(); else renderAnwesenheit();
}

// ══ HOME ══════════════════════════════════════════════════════
function renderHome() {
  var ds=today();
  var adjMap=getAdjMap(ds);
  var userDepts=getUserDepts();
  var totalPresent=D.employees.filter(function(e){
    if(userDepts&&userDepts.indexOf(e.department||'')===-1) return false;
    return adjMap[e.id]&&adjMap[e.id].status==='present';
  }).length;
  var activeAlarm=D.alarms.find(function(a){return !a.resolved;});
  var html='';
  // Banner
  if(activeAlarm) html+='<div style="background:#FF6600;color:#fff;padding:12px 16px;border-radius:12px;margin-bottom:12px;font-weight:700;cursor:pointer" onclick="showAlarm()">⚠️ AKTIVER ALARM — Zur Evakuierungsliste</div>';
  // Stat
  html+='<div class="statbox"><div class="statnum">'+totalPresent+'</div><div style="font-size:13px;opacity:.8;margin-top:4px">Mitarbeiter anwesend</div></div>';
  // Alarm button
  html+='<button class="alarmbtn'+(activeAlarm?' active':'')+'" onclick="alarmClick()"><div style="font-size:40px;margin-bottom:8px">🔥</div><div style="font-size:24px;font-weight:700;color:#fff;letter-spacing:2px">'+(activeAlarm?'ZUR EVAKUIERUNGSLISTE':'FEUERALARM')+'</div><div style="font-size:12px;color:rgba(255,255,255,.75);margin-top:4px">'+(activeAlarm?'Alarm aktiv':'Evakuierungsliste erstellen')+'</div></button>';
  document.getElementById('pgHome').innerHTML=html;

  // Dept summary - collapsible
  var deptMap={};
  D.employees.forEach(function(emp){
    if(userDepts&&userDepts.indexOf(emp.department||'')===-1) return;
    var dept=emp.department||'Sonstige';
    if(!deptMap[dept]) deptMap[dept]={emps:[],present:0,homeoffice:0,sick:0,vacation:0,absent:0,none:0};
    deptMap[dept].emps.push(emp);
    var st=adjMap[emp.id]?adjMap[emp.id].status:'none';
    deptMap[dept][st]=(deptMap[dept][st]||0)+1;
  });

  var homeContainer=document.getElementById('pgHome');
  var secTitle=document.createElement('div');
  secTitle.className='sec-title'; secTitle.textContent='AKTUELL ANWESEND';
  secTitle.style.marginBottom='10px';
  homeContainer.appendChild(secTitle);

  Object.keys(deptMap).sort().forEach(function(dept){
    var d=deptMap[dept];
    var isOpen=homeOpenDept===dept;

    var deptCard=document.createElement('div');
    deptCard.className='card clickable';
    deptCard.style.cssText='margin-bottom:8px;cursor:pointer';

    var pills='';
    if(d.present) pills+='<span class="badge b-present">✅ '+d.present+'</span>';
    if(d.homeoffice) pills+='<span class="badge b-homeoffice">🏠 '+d.homeoffice+'</span>';
    if(d.sick) pills+='<span class="badge b-sick">🤒 '+d.sick+'</span>';
    if(d.vacation) pills+='<span class="badge b-vacation">🌴 '+d.vacation+'</span>';
    if(d.absent) pills+='<span class="badge b-absent">❌ '+d.absent+'</span>';
    if(d.none) pills+='<span class="badge b-none">— '+d.none+'</span>';

    deptCard.innerHTML=
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">'+
        '<div style="font-weight:700;color:#1a1a2e;font-size:15px">'+h(dept)+'</div>'+
        '<div style="display:flex;align-items:center;gap:8px">'+
          '<span style="font-size:12px;color:#aaa">'+d.emps.length+' MA</span>'+
          '<span class="dept-arrow" style="font-size:18px;color:#aaa;display:inline-block;transform:'+(isOpen?'rotate(90deg)':'rotate(0deg)')+'">›</span>'+
        '</div>'+
      '</div>'+
      '<div style="display:flex;gap:6px;flex-wrap:wrap">'+pills+'</div>';

    // Employee list
    var empList=document.createElement('div');
    empList.style.cssText='display:'+(isOpen?'block':'none')+';margin-top:10px;border-top:1px solid #f0f0f0;padding-top:8px';

    d.emps.forEach(function(emp){
      var adj=adjMap[emp.id];
      var row=document.createElement('div');
      row.style.cssText='display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f8f8f8';
      row.innerHTML='<div><div style="font-size:14px;font-weight:600">'+h(emp.name)+'</div>'+
        (emp.position?'<div style="font-size:12px;color:#888">'+h(emp.position)+'</div>':'')+
        '</div>'+statusBadge(adj?adj.status:null);
      empList.appendChild(row);
    });

    deptCard.appendChild(empList);

    (function(dp, el, arrow){
      deptCard.addEventListener('click',function(){
        if(homeOpenDept===dp){ homeOpenDept=null; el.style.display='none'; arrow.style.transform='rotate(0deg)'; }
        else { homeOpenDept=dp; el.style.display='block'; arrow.style.transform='rotate(90deg)'; }
      });
    })(dept, empList, deptCard.querySelector('.dept-arrow'));

    homeContainer.appendChild(deptCard);
  });
}

function alarmClick(){
  var alarm=D.alarms.find(function(a){return !a.resolved;});
  if(alarm){showAlarm();return;}
  confirm2('🔥 Feueralarm auslösen','Evakuierungsliste erstellen?',function(){
    // Always snap ALL present employees (all depts) - filtering happens when viewing
    var snap=D.employees.filter(function(e){
      var adj=D.adjustments.find(function(a){return a.eid===e.id&&a.date===today();});
      return adj&&adj.status==='present';
    });
    // Store which depts the triggering user manages (for dept-specific end)
    var triggerDepts=getUserDepts();
    var newAlarm = {id:nid('alarm'),at:new Date().toISOString(),by:CU.username,resolved:null,snap:JSON.parse(JSON.stringify(snap)),triggerDepts:triggerDepts,resolvedDepts:[]};
    D.alarms.push(newAlarm);
    save();
    sbSyncAlarm(newAlarm).then(function(){ save(); });
    toast('Alarm ausgelöst!','err');
    showAlarm();
    startAutoRefresh();
  });
}

function showAlarm(){

  document.querySelectorAll('.bn').forEach(function(b){b.className='bn';});
  document.getElementById('pgAlarm').className='page on';

// ══ ALARM ═════════════════════════════════════════════════════
var alarmFilter = 'all';

function renderAlarm(){
  var alarm=D.alarms.find(function(a){return !a.resolved;});
  var pg=document.getElementById('pgAlarm');
  pg.innerHTML='';

  if(!alarm){
    pg.innerHTML='<div class="empty" style="padding-top:60px"><div style="font-size:48px;margin-bottom:12px">✅</div><div style="font-size:17px;font-weight:700;color:#2e7d32">Kein aktiver Alarm</div></div>';
    var backBtn=document.createElement('button');
    backBtn.className='btn btn-gray'; backBtn.style.cssText='max-width:200px;margin:20px auto';
    backBtn.textContent='← Zurück';
    backBtn.addEventListener('click',function(){showPage(0);});
    pg.appendChild(backBtn);
    return;
  }

  var cmap={};
  D.checkins.filter(function(c){return c.aid===alarm.id;}).forEach(function(c){cmap[c.eid]=c.status;});
  var present=alarm.snap||[];
  var userDepts=getUserDepts();
  if(userDepts) present=present.filter(function(e){return userDepts.indexOf(e.department||'')!==-1;});

  var safe=present.filter(function(e){return cmap[e.id]==='safe';}).length;
  var miss=present.filter(function(e){return cmap[e.id]==='missing';}).length;
  var inj=present.filter(function(e){return cmap[e.id]==='injured';}).length;

  // Check if this user's dept is already resolved
  var userDepts=getUserDepts();
  if(userDepts && alarm.resolvedDepts) {
    var myDone=userDepts.every(function(d){return alarm.resolvedDepts.indexOf(d)!==-1;});
    if(myDone){
      pg.innerHTML='<div class="empty" style="padding-top:60px"><div style="font-size:48px;margin-bottom:12px">✅</div><div style="font-size:17px;font-weight:700;color:#2e7d32">Deine Abteilung ist abgemeldet</div><div style="font-size:13px;color:#aaa;margin-top:8px">Alarm für andere Abteilungen noch aktiv</div></div>';
      return;
    }
  }

  // Back button
  var backBar=document.createElement('div');
  backBar.style.cssText='display:flex;align-items:center;gap:10px;margin-bottom:12px';
  var backBtn2=document.createElement('button');
  backBtn2.className='sbtn sbtn-gray';
  backBtn2.textContent='← Übersicht';
  backBtn2.addEventListener('click',function(){showPage(0);});
  backBar.appendChild(backBtn2);
  pg.appendChild(backBar);

  // Header
  var header=document.createElement('div');
  header.className='alarm-header';
  header.style.cssText='margin:-16px -16px 16px;border-radius:12px 12px 0 0';
  header.innerHTML=
    '<div style="font-size:22px;font-weight:700;letter-spacing:2px;text-align:center">🔥 EVAKUIERUNGSLISTE</div>'+
    '<div style="font-size:11px;text-align:center;opacity:.75;margin-top:4px">'+
      new Date(alarm.at).toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'})+' Uhr · '+h(alarm.by)+
    '</div>'+
    '<div class="alarm-stats">'+
      '<div class="astat"><div class="astat-n" id="aSafe">'+safe+'</div><div class="astat-l">Sicher</div></div>'+
      '<div class="astat"><div class="astat-n" id="aMiss">'+miss+'</div><div class="astat-l">Vermisst</div></div>'+
      '<div class="astat"><div class="astat-n" id="aInj">'+inj+'</div><div class="astat-l">Verletzt</div></div>'+
      '<div class="astat"><div class="astat-n">'+present.length+'</div><div class="astat-l">Gesamt</div></div>'+
    '</div>';
  pg.appendChild(header);

  // Filter buttons
  var filterBar=document.createElement('div');
  filterBar.style.cssText='display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px';
  [
    ['all','Alle','#1a1a2e','#f0f0f0'],
    ['none','❓ Kein Status','#888','#f0f0f0'],
    ['safe','✅ Sicher','#2e7d32','#e8f5e9'],
    ['missing','❗ Vermisst','#c62828','#ffebee'],
    ['injured','🚑 Verletzt','#e65100','#fff3e0']
  ].forEach(function(f){
    var btn=document.createElement('button');
    var isActive=alarmFilter===f[0];
    btn.style.cssText='border:2px solid '+f[2]+';border-radius:20px;padding:6px 14px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;background:'+(isActive?f[2]:'#fff')+';color:'+(isActive?'#fff':f[2]);
    btn.textContent=f[1];
    (function(key){
      btn.addEventListener('click',function(){alarmFilter=key;renderAlarm();});
    })(f[0]);
    filterBar.appendChild(btn);
  });
  pg.appendChild(filterBar);

  // Employee checkin cards
  var filtered=present.filter(function(e){
    if(alarmFilter==='all') return true;
    if(alarmFilter==='none') return !cmap[e.id];
    return cmap[e.id]===alarmFilter;
  });

  if(filtered.length===0){
    var empty=document.createElement('div');
    empty.className='empty'; empty.textContent='Keine Mitarbeiter in dieser Kategorie';
    pg.appendChild(empty);
  }

  present.forEach(function(e){
    if(alarmFilter!=='all'){
      var cs2=cmap[e.id]||null;
      if(alarmFilter==='none'&&cs2) return;
      if(alarmFilter!=='none'&&cs2!==alarmFilter) return;
    }
    var cs=cmap[e.id]||null;
    var statusLbl=cs==='safe'?'✅ Sicher':cs==='missing'?'❗ Vermisst':cs==='injured'?'🚑 Verletzt':'❓ Unbekannt';
    var statusBg=cs==='safe'?'#e8f5e9':cs==='missing'?'#ffebee':cs==='injured'?'#fff3e0':'#f0f0f0';
    var statusCol=cs==='safe'?'#2e7d32':cs==='missing'?'#c62828':cs==='injured'?'#e65100':'#888';

    var card=document.createElement('div');
    card.className='checkin-card'+(cs?' '+cs:'');

    var info=document.createElement('div');
    info.style.cssText='display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px';
    info.innerHTML=
      '<div>'+
        '<div style="font-weight:600;font-size:15px">'+h(e.name)+'</div>'+
        '<div style="font-size:12px;color:#888">'+h(e.department||'')+'</div>'+

      '<span style="font-size:12px;font-weight:600;padding:4px 10px;border-radius:12px;background:'+statusBg+';color:'+statusCol+'">'+statusLbl+'</span>';
    card.appendChild(info);

    var btnsDiv=document.createElement('div');
    btnsDiv.className='checkin-btns';
    [['safe','#e8f5e9','#2e7d32','✅ Sicher'],['missing','#ffebee','#c62828','❗ Vermisst'],['injured','#fff3e0','#e65100','🚑 Verletzt']].forEach(function(s){
      var btn=document.createElement('button');
      btn.style.cssText='background:'+s[1]+';color:'+s[2];
      btn.textContent=s[3];
      (function(aid,eid,st){
        btn.addEventListener('click',function(){doCheckin(aid,eid,st);});
      })(alarm.id, e.id, s[0]);
      btnsDiv.appendChild(btn);
    });
    card.appendChild(btnsDiv);
    pg.appendChild(card);
  }); // end present.forEach

  // Spacer + resolve bar
  var spacer=document.createElement('div');
  spacer.style.height='80px';
  pg.appendChild(spacer);

  var resolveBar=document.createElement('div');
  resolveBar.className='resolve-bar';
  var endBtn=document.createElement('button');
  endBtn.className='sbtn sbtn-red'; endBtn.style.cssText='flex:1;padding:12px';
  endBtn.textContent=getUserDepts()?'Meine Abteilung abmelden':'Alarm beenden';
  endBtn.addEventListener('click',endAlarm);
  resolveBar.appendChild(endBtn);
  pg.appendChild(resolveBar);
}

function doCheckin(aid,eid,status){
  D.checkins=D.checkins.filter(function(c){return !(c.aid===aid&&c.eid===eid);});
  D.checkins.push({aid:aid,eid:eid,status:status});
  save();
  sbSyncCheckin(aid,eid,status);
  renderAlarm();
}

function endAlarm(){
  var alarm=D.alarms.find(function(a){return !a.resolved;});
  if(!alarm) return;
  var userDepts=getUserDepts();
  var cmap={};
  D.checkins.filter(function(c){return c.aid===alarm.id;}).forEach(function(c){cmap[c.eid]=c.status;});

  if(!userDepts){
    // Admin ends entire alarm
    var notOk=alarm.snap.filter(function(e){return !cmap[e.id]||cmap[e.id]==='missing';}).length;
    confirm2('Alarm beenden',notOk>0?notOk+' Mitarbeiter unbestätigt. Trotzdem beenden?':'Gesamten Alarm beenden?',function(){
      alarm.resolved=new Date().toISOString();
      save();
      sbSyncAlarm(alarm);
      stopAutoRefresh();
      toast('Alarm beendet','ok'); showPage(0);
    });
  } else {
    // Dept head ends only their dept
    var myEmps=alarm.snap.filter(function(e){return userDepts.indexOf(e.department||'')!==-1;});
    var notOk=myEmps.filter(function(e){return !cmap[e.id]||cmap[e.id]==='missing';}).length;
    confirm2('Abteilung abmelden',notOk>0?notOk+' Mitarbeiter unbestätigt. Trotzdem abmelden?':'Deine Abteilung als evakuiert melden?',function(){
      if(!alarm.resolvedDepts) alarm.resolvedDepts=[];
      userDepts.forEach(function(d){
        if(alarm.resolvedDepts.indexOf(d)===-1) alarm.resolvedDepts.push(d);
      });
      // Check if ALL depts are done
      var allDepts=D.departments.map(function(d){return d.name;});
      var allDone=allDepts.every(function(d){return alarm.resolvedDepts.indexOf(d)!==-1;});
      if(allDone){
        alarm.resolved=new Date().toISOString();
      }
      save();
      sbSyncAlarm(alarm); // Sync resolvedDepts to Supabase
      if(allDone){
        stopAutoRefresh();
        toast('Alle Abteilungen abgemeldet - Alarm beendet!','ok');
      } else {
        toast('Deine Abteilung wurde abgemeldet','ok');
      }
      showPage(0);
    });
  }
}

function saveEmp(){
  var name=document.getElementById('eName').value.trim();
  var dept=document.getElementById('eDept').value;
  var pos=document.getElementById('ePos').value.trim();
  var tel=document.getElementById('eTel').value.trim();

  save(); closeModal('mEmp'); renderMitarbeiter();
}

// Excel
function importXlsx(input){
  var file=input.files[0]; if(!file) return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var wb=XLSX.read(e.target.result,{type:'binary'});
      var rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:''});
      var imp=0,skip=0,td=today();
      var SM={anwesend:'present',present:'present',krank:'sick',sick:'sick',urlaub:'vacation',vacation:'vacation',homeoffice:'homeoffice',abwesend:'absent',absent:'absent'};
      rows.forEach(function(row){
        function k(x){return Object.keys(row).find(function(r){return r.toLowerCase().includes(x);});}
        var name=String(row[k('name')]||'').trim();
        var pos=String(row[k('position')]||row[k('stelle')]||'').trim();
        var dept=String(row[k('abteil')]||row[k('dept')]||'').trim();
        var phone=String(row[k('telefon')]||row[k('tel')]||row[k('phone')]||'').trim();
        var sr=String(row[k('status')]||'').trim().toLowerCase();
        if(!name){skip++;return;}
        if(dept&&!D.departments.find(function(d){return d.name===dept;})) D.departments.push({id:nid('dept'),name:dept});
        if(D.employees.find(function(e){return e.name===name;})){skip++;return;}
        var id=nid('emp');
        D.employees.push({id:id,name:name,department:dept,position:pos,phone:phone});
        imp++;
        if(sr&&SM[sr]) D.adjustments.push({id:nid('adj'),eid:id,date:td,status:SM[sr],note:''});
      });
      save(); input.value=''; renderMitarbeiter();
      toast('Import: '+imp+' neu, '+skip+' übersprungen','ok');
    }catch(err){toast('Fehler: '+err.message,'err');}
  };

}

function renderHistorie(){
  var pg=document.getElementById('pgHistorie');
  if(!D.alarms.length){pg.innerHTML='<div class="empty"><div style="font-size:40px;margin-bottom:10px">📋</div>Noch keine Alarme</div>';return;}
  var byDay={};
  [...D.alarms].reverse().forEach(function(a){
    var d=a.at.slice(0,10); if(!byDay[d]) byDay[d]=[]; byDay[d].push(a);
  });
  var html='';
  Object.keys(byDay).sort().reverse().forEach(function(day){
    var alarms=byDay[day];
    var d=new Date(day+'T12:00:00');
    var days=['So','Mo','Di','Mi','Do','Fr','Sa'];
    var months=['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];
    var hasActive=alarms.some(function(a){return !a.resolved;});
    html+='<details style="background:#fff;border-radius:12px;margin-bottom:8px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06)"'+(hasActive?' open':'')+'>';
    html+='<summary style="padding:14px 16px;cursor:pointer;font-weight:700;display:flex;justify-content:space-between;align-items:center;list-style:none">';
    html+='<span>'+(hasActive?'🔥':'📁')+' '+days[d.getDay()]+', '+d.getDate()+'. '+months[d.getMonth()]+'</span>';
    html+='<span style="font-size:12px;color:#aaa">'+alarms.length+' Alarm'+(alarms.length>1?'e':'')+(hasActive?' · <span style="color:#CC0000">AKTIV</span>':'')+'</span>';
    html+='</summary>';

    alarms.forEach(function(alarm){
      var cmap={};
      D.checkins.filter(function(c){return c.aid===alarm.id;}).forEach(function(c){cmap[c.eid]=c.status;});
      var snap=alarm.snap||[];
      var safe=snap.filter(function(e){return cmap[e.id]==='safe';}).length;
      var miss=snap.filter(function(e){return cmap[e.id]==='missing';}).length;
      var inj=snap.filter(function(e){return cmap[e.id]==='injured';}).length;
      var unk=snap.filter(function(e){return !cmap[e.id];}).length;
      var startTime=new Date(alarm.at).toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});
      var endTime=alarm.resolved?new Date(alarm.resolved).toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'}):null;

      html+='<div style="padding:14px 16px;border-top:1px solid #f0f0f0">';

      // Alarm header
      html+='<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">';
      html+='<div>';
      html+='<div style="font-size:15px;font-weight:700">🔥 Alarm '+startTime+' Uhr</div>';
      html+='<div style="font-size:12px;color:#888;margin-top:2px">Ausgelöst von: <b>'+h(alarm.by)+'</b></div>';
      if(endTime) html+='<div style="font-size:12px;color:#2e7d32;margin-top:2px">✅ Beendet um '+endTime+' Uhr</div>';
      else html+='<div style="font-size:12px;color:#CC0000;font-weight:700;margin-top:2px">● AKTIV</div>';
      html+='</div>';
      if(CU&&CU.role==='admin') html+='<button class="sbtn sbtn-gray" style="padding:4px 8px;font-size:12px" onclick="delAlarm('+alarm.id+')">🗑️</button>';
      html+='</div>';

      // Summary badges
      html+='<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">';
      html+='<span class="badge b-present">✅ '+safe+' Sicher</span>';
      if(miss) html+='<span class="badge b-sick">❗ '+miss+' Vermisst</span>';
      if(inj) html+='<span class="badge b-absent">🚑 '+inj+' Verletzt</span>';
      if(unk) html+='<span class="badge b-none">❓ '+unk+' Unbekannt</span>';
      html+='<span class="badge b-none">👥 '+snap.length+' Gesamt</span>';
      html+='</div>';

      // Dept resolved info
      if(alarm.resolvedDepts && alarm.resolvedDepts.length > 0) {
        html+='<div style="font-size:12px;color:#555;margin-bottom:10px">Abgemeldete Abteilungen: <b>'+alarm.resolvedDepts.join(', ')+'</b></div>';
      }

      // Employee detail list (collapsible)
      html+='<details style="margin-top:4px">';
      html+='<summary style="font-size:13px;color:#1e3a8a;cursor:pointer;font-weight:600;list-style:none;padding:4px 0">👤 Mitarbeiterliste anzeigen</summary>';
      html+='<div style="margin-top:8px">';

      // Group by dept - collapsible
      var deptGroups={};
      snap.forEach(function(e){
        var dept=e.department||'Sonstige';
        if(!deptGroups[dept]) deptGroups[dept]=[];
        deptGroups[dept].push(e);
      });

      Object.keys(deptGroups).sort().forEach(function(dept){
        var emps=deptGroups[dept];
        var dSafe=emps.filter(function(e){return cmap[e.id]==='safe';}).length;
        var dMiss=emps.filter(function(e){return cmap[e.id]==='missing';}).length;
        var dInj=emps.filter(function(e){return cmap[e.id]==='injured';}).length;
        var dUnk=emps.filter(function(e){return !cmap[e.id];}).length;

        html+='<details style="margin-bottom:6px;border:1px solid #f0f0f0;border-radius:8px;overflow:hidden">';
        html+='<summary style="padding:8px 12px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;list-style:none;background:#fafafa">';
        html+='<span style="font-size:13px;font-weight:700;color:#1a1a2e">'+h(dept)+'</span>';
        html+='<div style="display:flex;gap:4px;align-items:center">';
        if(dSafe) html+='<span class="badge b-present" style="font-size:10px;padding:2px 6px">✅ '+dSafe+'</span>';
        if(dMiss) html+='<span class="badge b-sick" style="font-size:10px;padding:2px 6px">❗ '+dMiss+'</span>';
        if(dInj)  html+='<span class="badge b-absent" style="font-size:10px;padding:2px 6px">🚑 '+dInj+'</span>';
        if(dUnk)  html+='<span class="badge b-none" style="font-size:10px;padding:2px 6px">❓ '+dUnk+'</span>';
        html+='<span style="font-size:16px;color:#aaa;margin-left:4px">›</span>';
        html+='</div></summary>';
        html+='<div style="padding:4px 12px 8px">';
        emps.forEach(function(e){
          var cs=cmap[e.id]||null;
          var statusLabel=cs==='safe'?'✅ Sicher':cs==='missing'?'❗ Vermisst':cs==='injured'?'🚑 Verletzt':'❓ Unbekannt';
          var statusCls=cs==='safe'?'b-present':cs==='missing'?'b-sick':cs==='injured'?'b-absent':'b-none';
          html+='<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #f8f8f8">';
          html+='<div style="font-size:13px">'+h(e.name)+'</div>';
          html+='<span class="badge '+statusCls+'" style="font-size:11px">'+statusLabel+'</span>';
          html+='</div>';
        });
        html+='</div></details>';
      });

      html+='</div></details>';
      html+='</div>';
    });

    html+='</details>';
  });
  pg.innerHTML=html;
}

function sbHeaders() {
  return {'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json'};
}

async function sbGet(table, query) {
  try {
    var r = await fetch(SB_URL+'/rest/v1/'+table+'?select=*'+(query||''), {headers:sbHeaders()});
    return r.ok ? await r.json() : null;
  } catch(e) { return null; }
}

async function sbPost(table, data) {
  try {
    var r = await fetch(SB_URL+'/rest/v1/'+table, {
      method:'POST', headers:Object.assign({},sbHeaders(),{'Prefer':'return=representation'}),
      body:JSON.stringify(data)
    });
    return r.ok ? await r.json() : null;
  } catch(e) { return null; }
}

async function sbPatch(table, filter, data) {
  try {
    var r = await fetch(SB_URL+'/rest/v1/'+table+'?'+filter, {
      method:'PATCH', headers:Object.assign({},sbHeaders(),{'Prefer':'return=representation'}),
      body:JSON.stringify(data)
    });
    return r.ok ? await r.json() : null;
  } catch(e) { return null; }
}

async function sbUpsert(table, data, onConflict) {
  try {
    var url = SB_URL+'/rest/v1/'+table+(onConflict?'?on_conflict='+onConflict:'');
    var r = await fetch(url, {
      method:'POST',
      headers:Object.assign({},sbHeaders(),{'Prefer':'return=representation,resolution=merge-duplicates'}),
      body:JSON.stringify(data)
    });
    return r.ok ? await r.json() : null;
  } catch(e) { return null; }
}

async function sbDelete(table, filter) {
  try {
    var r = await fetch(SB_URL+'/rest/v1/'+table+'?'+filter, {
      method:'DELETE', headers:sbHeaders()
    });
    return r.ok;
  } catch(e) { return false; }
}

// ── Initial data upload ────────────────────────────────────────
async function uploadToSupabase() {
  try {
    // Departments
    await Promise.all(D.departments.map(function(d) {
      return sbUpsert('departments', {name:d.name}, 'name');
    }));

    // Users
    await Promise.all(D.users.map(function(u) {
      return sbUpsert('users', {
        username:u.username, password:u.password,
        role:u.role, departments:u.departments||[]
      }, 'username');
    }));

    // Employees - get Supabase IDs back
    var empResults = await sbGet('employees', '&order=id');
    if (!empResults || empResults.length === 0) {
      // Upload employees
      for (var i=0; i<D.employees.length; i++) {
        var e=D.employees[i];
        await sbPost('employees', {name:e.name,department:e.department,position:e.position||'',phone:e.phone||''});
      }
      empResults = await sbGet('employees', '&order=id');
    }

    // Build name->id map from Supabase
    var empNameToId = {};
    if (empResults) empResults.forEach(function(e){empNameToId[e.name]=e.id;});

    // Upload today's adjustments using Supabase IDs
    var td = today();
    var todayAdjs = D.adjustments.filter(function(a){return a.date===td;});
    var empById = {};
    D.employees.forEach(function(e){empById[e.id]=e;});
    
    await Promise.all(todayAdjs.map(function(a) {
      var emp = empById[a.eid];
      if (!emp || !empNameToId[emp.name]) return Promise.resolve();
      var sbEid = empNameToId[emp.name];
      return sbUpsert('adjustments', {eid:sbEid,date:a.date,status:a.status,note:a.note||''}, 'eid,date');
    }));

    toast('Daten synchronisiert!', 'ok');
    SB_READY = true;
  } catch(e) {
    console.error('Supabase upload error:', e);
  }
}

// ── Load from Supabase ─────────────────────────────────────────
async function loadFromSupabase() {
  try {
    var [users, depts, emps, adjs, alarms, checkins] = await Promise.all([
      sbGet('users'),
      sbGet('departments'),
      sbGet('employees', '&order=id'),
      sbGet('adjustments'),
      sbGet('alarms'),
      sbGet('checkins')
    ]);

    if (users && users.length > 0) {
      // Keep built-in users, merge with Supabase users
      D.users = users;
    }
    if (depts && depts.length > 0) D.departments = depts;
    if (emps && emps.length > 0) D.employees = emps.map(function(e){
      return {id:e.id,name:e.name,department:e.department||'',position:e.position||'',phone:e.phone||''};
    });
    if (adjs && adjs.length > 0) D.adjustments = adjs.map(function(a){
      return {id:a.id,eid:a.eid,date:a.date,status:a.status,note:a.note||''};
    });
    if (alarms) D.alarms = alarms.map(function(a){
      return {id:a.id,at:a.triggered_at,by:a.triggered_by,
        resolved:a.resolved_at,snap:a.snap||[],
        resolvedDepts:a.resolved_depts||[]};
    });
    if (checkins) D.checkins = checkins.map(function(c){
      return {aid:c.alarm_id,eid:c.eid,status:c.status};
    });

    SB_READY = true;
    save();
    return true;
  } catch(e) {
    console.error('Supabase load error:', e);
    return false;
  }
}

async function sbSyncAdj(eid, ds, status) {
  if (!SB_READY) return;
  if (status === null) {
    await sbDelete('adjustments', 'eid=eq.'+eid+'&date=eq.'+ds);
  } else {
    await sbUpsert('adjustments', {eid:eid,date:ds,status:status,note:''}, 'eid,date');
  }
}

async function sbSyncAlarm(alarm) {
  if (!SB_READY) return;
  var data = {
    triggered_at: alarm.at,
    triggered_by: alarm.by,
    snap: alarm.snap,
    resolved_depts: alarm.resolvedDepts||[]
  };
  if (alarm.resolved) data.resolved_at = alarm.resolved;
  if (alarm.id && alarm.id > 0) {
    await sbPatch('alarms', 'id=eq.'+alarm.id, data);
  } else {
    var result = await sbPost('alarms', data);
    if (result && result[0]) alarm.id = result[0].id;
  }
}

async function sbSyncCheckin(alarm_id, eid, status) {
  if (!SB_READY) return;
  await sbUpsert('checkins', {alarm_id:alarm_id,eid:eid,status:status}, 'alarm_id,eid');
}

  if (!SB_READY) return;
  await sbUpsert('users', {
    username:user.username, password:user.password,
    role:user.role, departments:user.departments||[]
  }, 'username');
}

// ── Auto-refresh during alarm ──────────────────────────────────
function startAutoRefresh() {
  stopAutoRefresh();
  _autoRefresh = setInterval(async function() {
    var alarm = D.alarms.find(function(a){return !a.resolved;});
    if (!alarm || !SB_READY) return;
    // Reload checkins from Supabase
    var checkins = await sbGet('checkins', '&alarm_id=eq.'+alarm.id);
    if (checkins) {
      D.checkins = D.checkins.filter(function(c){return c.aid!==alarm.id;});
      checkins.forEach(function(c){
        D.checkins.push({aid:c.alarm_id,eid:c.eid,status:c.status});
      });
      save();
      if (document.getElementById('pgAlarm').className.includes('on')) {
        renderAlarm();
      }
      if (document.getElementById('pgHome').className.includes('on')) {
        renderHome();
      }
    }
  }, 10000); // Every 10 seconds
}

function stopAutoRefresh() {
  if (_autoRefresh) { clearInterval(_autoRefresh); _autoRefresh=null; }
}

// ── Init on login ──────────────────────────────────────────────
async function initSupabase() {
  var existing = await sbGet('departments');
  if (!existing || existing.length === 0) {
    // First time - upload all data
    toast('Erstmalige Einrichtung...', 'ok');
    await uploadToSupabase();
  } else {
    // Load from Supabase
    await loadFromSupabase();
  }
  // Start auto-refresh if alarm is active
  var alarm = D.alarms.find(function(a){return !a.resolved;});
  if (alarm) startAutoRefresh();
}

</script>
